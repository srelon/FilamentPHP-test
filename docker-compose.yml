services:
  nginx:
    image: nginx:alpine
    container_name: filament_nginx
    ports:
      - "${SITE_PORT}:${SITE_PORT}"
    environment:
      - SITE_PORT=${SITE_PORT}
    volumes:
      - ./:/var/www
      - ./_docker/nginx/conf.d/templates:/etc/nginx/templates
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: ./_docker/app/Dockerfile
    container_name: filament_app
    user: "1000:1000"
    entrypoint: ["sh", "/var/www/_docker/app/entrypoint.sh"]
    volumes:
      - ./:/var/www
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: ./_docker/app/Dockerfile
    container_name: filament_scheduler
    user: "1000:1000"
    entrypoint: ["sh", "/var/www/_docker/app/scheduler-entrypoint.sh"]
    restart: unless-stopped
    volumes:
      - ./:/var/www
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  websocket:
    image: node:20-alpine
    container_name: filament_websocket
    working_dir: /var/www/websocket
    command: sh -c "npm install && npm start"
    ports:
      - "6001:6001"
    volumes:
      - ./websocket:/var/www/websocket
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: filament_redis
    ports:
      - "6379:6379"

  db:
    image: mysql:8.0
    container_name: filament_db
    ports:
      - "8101:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci ${MYSQL_EXTRA_FLAGS:-}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  db_data:
